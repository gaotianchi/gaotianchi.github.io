- title: 汉密尔顿
  creator: Lin-Manuel Miranda
  type: 音乐剧
  started: 2026-03-20
  notes: 从亚历山大·汉密尔顿的视角，认识美国独立战争以及后续司法、财政等政治系统的建立过程。更多的，又认识了一位精神好友。不知道该如何描绘此刻的感受，只是热泪盈眶。

- title: 我们为什么会嫉妒？| 迫切提问 S01E06
  creator: 阿鹿
  type: 播客
  started: 2026-03-19
  notes: 最近几个月来喜欢在活页纸上写作，这是一种能让我专注于当下感受的活动。尤其是使用钢笔，当周围只剩下笔尖划过纸张的声音的时候，隐匿已久的真切情感会如同墨水一般缓缓地流淌出来。那是一种能够感受到自我的"存在"的感受。

- title: 建立「边界感」这件事为什么总是那么难？| 迫切提问 S03E08
  creator: 阿鹿
  type: 播客
  started: 2026-03-17
  notes: 边界感是必须的，毫不夸张地说，它是幸福的决定性因素之一。

- title: 冰雪奇缘
  creator: 迪士尼戏剧集团
  type: 音乐剧
  started: 2026-03-15
  notes: 出乎意料的是，音乐剧版的《冰雪奇缘》里，拯救安娜的不是爱情之吻。另外，最开始还犹豫艾莎是不是最新版电影《悲惨世界》的艾泼妮，听到歌声之后，我确信，又遇见你了。

- title: 中间人经济
