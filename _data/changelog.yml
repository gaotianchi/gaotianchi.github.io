# 站点变更记录
#
# 格式：
#   - date: 日期（必填）— YYYY-MM-DD，用于排序和年份分组
#     desc: 变更描述（必填）

- date: 2026-07-16
  desc: 新增阅览页面，以时间轴格式记录书影音消费。导航栏菜单项统一使用中文。阅览页面适配移动端，条目支持关联文章链接。变更记录页改为数据驱动，条目默认单行截断、点击展开。页脚新增阅览页面链接。新增摄影页面，照片按日期时间轴展示，点击放大灯箱浏览，支持键盘左右切换和 ESC 关闭，首末张有边界提示。灯箱加载时显示旋转提示，照片网格有骨架屏过渡。展示版图片叠加网址水印。桌面端菜单 hover 显示下划线展开动画，移动端菜单改为毛玻璃遮罩、链接逐项滑入、汉堡图标旋转过渡为关闭按钮。关于页面补充摄影入口。全站样式元素统一为变量管理，修复内容页脚邮箱不一致。

- date: 2026-07-15
  desc: RSS feed 文章更新时间改用 front matter 中的 lastmod。导航栏下方名言透明度提升。

- date: 2026-07-14
  desc: 新增 7 条自由主题名言。名言容器改为固定高度，消除加载时的布局跳跃。

- date: 2026-07-13
  desc: 移动端首页 logo 上方增加呼吸空间，不再紧贴导航栏。页脚调整为三栏或单栏，去掉两栏中间状态，避免中宽屏幕右侧大片空白。页脚上方空白空间增加。

- date: 2026-07-12
  desc: 重写 AI 使用声明和站点信息页面。全站链接样式分型调整，正文链接换用更温和的灰褐色。页面背景色微调，减少黄感。正文外链添加虚线下划线和箭头标识。归档页时间轴悬停圆点缩小并下移，标题字间距与首页统一。移动端首页标题字号增大，与归档页一致。变更记录页由列表改为表格，移动端优化为卡片布局。内容页底部信息栏重新设计，AI 标识独立一行、更加低调。文章底部导航上移为页面最后出口，与正文间距增加。文章目录暂时隐藏。深色模式下首页与归档页标题颜色统一。深色模式页面切换不再闪烁。字体加载优化，页面开启更快。

- date: 2026-07-10
  desc: 增加内容区底部间距，微调页脚上边距。

- date: 2026-07-09
  desc: 首页归档入口文案改为"更多文字"，字号与字间距对齐日期列表。

- date: 2026-07-08
  desc: 新增诗歌页面布局，中文衬线字体换为宋体风格。首页列表标题与日期之间改用自适应虚线连接，全站标题字间距统一调整。移除自定义文本选中色，恢复浏览器默认。归档页仅保留分类筛选，按文章数量降序排列；主题切换过渡更平滑。移除 8 篇早期文章。出于隐私考量，作者名改为 Tianchi，网站标题改为大写 TIANCHI，头像和默认社交预览图一并移除。

- date: 2026-06-23
  desc: RSS 订阅格式修正，支持全文输出。订阅分类精简，仅保留文章正文分类。移动端首页日期左对齐修复。

- date: 2026-06-21
  desc: "全站中文化：导航、页面标题、页脚统一使用中文。首页排版重构：桌面端书本目录风格（标题 ············ 日期），移动端日期置顶。中文字体换用霞鹜文楷，正文超链接新增蓝色下划线。图片支持懒加载，消除布局偏移；文章水印移至目录右侧并随机旋转。标题旁显示 # 锚点链接；目录标题可点击回到顶部。文章目录自动生成，滚动高亮当前位置。所有历史文章公开可见。"

- date: 2026-05-28
  desc: 浅色主题背景由纯白改为暖调纸色，强化旧书页质感。

- date: 2026-05-27
  desc: 首页头部改为徽记居中布局，配装饰分隔线与衬线格言。归档页分类和标签分组显示，新增筛选栏。文章页排版重构：标题左对齐、衬线元信息、正文前装饰分隔线。文章目录自动生成，内联展示，滚动高亮当前位置。文章页新增水印，低透明度倾斜置于标题区域后方。首页徽记预留宽高比，消除加载跳动。

- date: 2026-05-25
  desc: 归档页全新设计：纵向时间线 + 水印年份，标签云 + 分类筛选，支持分类与标签组合过滤。文章分类与标签体系重构，统一命名规范。全站新增回到顶部按钮。

- date: 2026-05-24
  desc: 左上角主题切换图标动态化：浅色主题显示太阳，深色主题显示月亮，切换带旋转过渡动画。首次访问自动跟随系统偏好。

- date: 2026-05-23
