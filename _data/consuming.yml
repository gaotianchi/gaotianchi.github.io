- title: 中间人经济
  creator: 玛丽娜·克拉科夫斯基
  type: 书籍
  started: 2025-01-01
  notes: 每个人都在这个庞大的社会网络中扮演中介角色，越是复杂的网络，中介愈是承担重要的责任。它为我提供了一个重新看到自身职业身份的视角，并指导我选择事业方向。

