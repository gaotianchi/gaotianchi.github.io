<div class="author">
  <div class="author-avatar-wrap">
    <img
      class="author-avatar"
      src="{{ site.author.avatar }}"
      alt="{{ site.author.username }}"
    />
  </div>
  <div class="author-content">
    <img class="author-calligraphy" src="/assets/img/gaotianchi-calligraphy.svg" alt="{{ site.author.name }}">
    <p class="author-bio">{{ site.author.bio }}</p>
  </div>
</div>
