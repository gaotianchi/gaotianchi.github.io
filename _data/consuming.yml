- title: 汉密尔顿
  creator: Lin-Manuel Miranda
  type: 歌剧
  started: 2026-03-20
  notes: 从亚历山大·汉密尔顿的视角，认识美国独立战争以及后续司法、财政等政治系统的建立过程。更多的，又认识了一位精神好友。不知道该如何描绘此刻的感受，只是热泪盈眶。

- title: 我们为什么会嫉妒？| 迫切提问 S01E06
  creator: 阿鹿
  type: 播客
  started: 2026-03-19
  notes: 最近几个月来喜欢在活页纸上写作，这是一种能让我专注于当下感受的活动。尤其是使用钢笔，当周围只剩下笔尖划过纸张的声音的时候，隐匿已久的真切情感会如同墨水一般缓缓地流淌出来。那是一种能够感受到自我的"存在"的感受。"嗨！我们又见面了！"，混沌的我对诚实的我说，"你现在的真实感受到底是怎样的？""我感受到了某种类似于'嫉妒'的情绪……"诚实的我将这句话呈现在了活页纸上，然后继续说道"或许你应该承认这一点。""什么？我没有承认吗？"混沌的我揪着自己的头发，有些困惑。"是的，你没有承认它。"诚实的我说道。

