---
layout: compress
---

{% include head.html %}

<main>

    {% include header.html %}


    <h1>{{ page.title }}</h1>
    <div style="display: flex; justify-content: space-between;">
        <i>{{ page.date | date: "%b %d, %Y" }}</i>
        {% if page.original %}
        <a href="/picture/{{ page.original }}" target="_blank">[[{{ page.slug }}]]</a>
        {% endif %}
    </div>
    <h4 class="subtitle">{{ page.subtitle }}</h4>

    {{ page.content }}



</main>

{% include footer.html %}

</body>

</html>
