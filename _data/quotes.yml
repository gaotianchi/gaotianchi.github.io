- text: 我们写作，是为了被看见。
  source: 佚名
- text: 沉默是对喧嚣最好的回答。
  source: 佚名
- text: 真正重要的东西，用眼睛是看不见的。
  source: 《小王子》
- text: 人生如逆旅，我亦是行人。
  source: 苏轼
- text: 种一棵树最好的时间是十年前，其次是现在。
  source: 佚名
- text: 万物皆有裂痕，那是光照进来的地方。
  source: 莱昂纳德·科恩
- text: 少则得，多则惑。
  source: 《道德经》
- text: 当我们沉默时，世界便安静了。
  source: 佚名
- text: 自由不是想做什么就做什么，而是不想做什么就不做。
  source: 康德
- text: 你当像鸟飞往你的山。
  source: 塔拉·韦斯特弗
- text: 一个人知道自己为什么而活，就可以忍受任何一种生活。
  source: 尼采
- text: 随心所欲不逾矩。
  source: 《论语》
- text: 真正的自由，是拥有说"不"的权利。
  source: 佚名
- text: 笼子再华丽，也不如一根树枝自在。
  source: 佚名
- text: 大地上最自由的是风，但它从不问归处。
  source: 佚名
