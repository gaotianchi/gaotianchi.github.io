<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="0; url=/archive/">
<title>Redirecting...</title>
<script>
  var hash = window.location.hash.replace('#', '');
  if (hash) {
    window.location.replace('/archive/?tag=' + encodeURIComponent(hash));
  } else {
    window.location.replace('/archive/');
  }
</script>
</head>
<body>
  <p><a href="/archive/">点击此处跳转到归档页面</a></p>
</body>
</html>
